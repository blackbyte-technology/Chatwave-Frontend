name: Build & Deploy Frontend to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NEXT_PUBLIC_API_URL: http://13.126.170.115:5080/api
  NEXT_PUBLIC_API_BASE_URL: /api
  NEXT_PUBLIC_STORAGE_URL: http://13.126.170.115:5080/
  NEXT_PUBLIC_SOCKET_URL: http://13.126.170.115:5080/
  NEXT_PUBLIC_WAPI_ADMIN_URL: http://13.126.170.115:8080
  NEXTAUTH_URL: http://13.126.170.115
  AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
  NEXTAUTH_SECRET: ${{ secrets.AUTH_SECRET }}

jobs:
  build-and-deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build production
        run: npm run build

      - name: Package standalone build
        run: |
          mkdir -p deploy-artifacts
          tar -czf deploy-artifacts/frontend-deploy.tar.gz -C .next/standalone .
          tar -czf deploy-artifacts/frontend-static.tar.gz -C .next static
          tar -czf deploy-artifacts/frontend-public.tar.gz -C public .

      - name: Upload to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy-artifacts/*"
          target: /tmp/frontend-upload
          overwrite: true

      - name: Deploy & Restart
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            echo ">>> Deploying ChatWave Frontend..."
            cd /home/ubuntu/chatwave/frontend

            # Preserve .env
            cp .env /tmp/frontend-env-backup 2>/dev/null || true

            # Clean and extract
            find . -maxdepth 1 ! -name '.env' ! -name '.' -exec rm -rf {} +
            tar -xzf /tmp/frontend-upload/deploy-artifacts/frontend-deploy.tar.gz
            mkdir -p .next public
            tar -xzf /tmp/frontend-upload/deploy-artifacts/frontend-static.tar.gz -C .next/
            tar -xzf /tmp/frontend-upload/deploy-artifacts/frontend-public.tar.gz -C public/

            # Handle nested dir from standalone
            if [ -d "Chatwave-Frontend" ]; then
              cp -r Chatwave-Frontend/* . 2>/dev/null || true
              rm -rf Chatwave-Frontend
            fi

            # Restore .env
            cp /tmp/frontend-env-backup .env 2>/dev/null || true

            # Cleanup
            rm -rf /tmp/frontend-upload /tmp/frontend-env-backup

            echo ">>> Restarting frontend..."
            pm2 restart chatwave-frontend --update-env
            pm2 save

            sleep 5
            STATUS=$(curl -sf -o /dev/null -w '%{http_code}' http://localhost:3000 || echo "000")
            if [ "$STATUS" = "307" ] || [ "$STATUS" = "200" ]; then
              echo "✅ Frontend deployed successfully! (HTTP $STATUS)"
            else
              echo "❌ Health check failed! (HTTP $STATUS)"
              pm2 logs chatwave-frontend --lines 20 --nostream
              exit 1
            fi
